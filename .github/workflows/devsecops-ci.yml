name: CloudGuard AI Security Scan & Container Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  code-quality-and-test-suite:
    name: Code Quality and Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cloudguard
          POSTGRES_PASSWORD: cloudguard_secret
          POSTGRES_DB: cloudguard_db
        options: >-
          --health-cmd "pg_isready -U cloudguard -d cloudguard_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      localstack:
        image: localstack/localstack:3.8.0
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4566:4566

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Python 3.12 Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      - name: Run Flake8 PEP 8 & Complexity Checks
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --max-complexity=10 --max-line-length=120 --statistics

      - name: Verify Black Code Formatting
        run: black --check backend/

      - name: Execute Pytest Integration & Unit Tests
        env:
          DATABASE_URL: postgresql+asyncpg://cloudguard:cloudguard_secret@localhost:5432/cloudguard_db
          GROQ_API_KEY: test_key
          GEMINI_API_KEY: test_key
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET_NAME: cloudguard-artifacts
        run: pytest backend/tests/ -v --tb=short

  container-image-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: code-quality-and-test-suite
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Build Production Docker Container
        run: docker build -t cloudguard-ai:test .
