# Production stack for a single host (e.g. an EC2 instance):
# containerized Postgres, real S3 via the instance IAM role.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# The .env on the host must set APP_ENV=production, real API keys, and
# leave AWS_ENDPOINT_URL / AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY empty
# unless you are deliberately using static credentials.

services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cloudguard_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cloudguard} -d $${POSTGRES_DB:-cloudguard_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cloudguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudguard_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: always

volumes:
  pgdata:
