
services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: cloudguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudguard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cloudguard_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudguard -d cloudguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: docker.io/localstack/localstack:3.8.0
    container_name: cloudguard-localstack
    environment:
      - SERVICES=s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend:z
      - ./frontend:/app/frontend:z
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  localstack_data:
